<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextPlay - Pesquisa</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/pesquisa.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="../Images/Logo Nextplay.png" alt="Logo NextPlay" class="logo-img">
            <span class="logo-texto">NextPlay</span>
        </div>
        <nav class="menu-links">
            <a href="../index.html">Home</a>
            <a href="../index.html">Jogos</a>
            <a href="#">Top 10</a>
            <a href="sobre.html">Sobre</a>
            <a href="categorias.html">Categorias</a>
        </nav>
        <div class="nav-icons">
            <a href="#" class="active" style="color: inherit; text-decoration: none;">
                <i class="fas fa-search"></i>
            </a>
            <i class="far fa-user-circle"></i>
        </div>
    </header>

    <main class="main-content">
        
        <div class="container-busca">
            <div class="input-busca-wrapper">
                <i class="fas fa-search icone-busca"></i>
                <input type="text" placeholder="Procurando algum jogo específico?" class="input-busca">
            </div>
        </div>

        <div class="jogos-grid">
            
            <div class="card-jogo">
                <div class="capa-wrapper">
                    <img src="../Images/Mouse P.I..jpg" alt="MOUSE">
                    <div class="info-overlay">
                        <h2 class="titulo-jogo">MOUSE</h2>
                        <p class="detalhes-jogo">2026 - FPS</p>
                    </div>
                </div>
            </div>

            <div class="card-jogo">
                <div class="capa-wrapper">
                    <img src="../Images/GTA 6.webp" alt="GTA VI">
                    <div class="info-overlay">
                        <h2 class="titulo-jogo">GTA VI</h2>
                        <p class="detalhes-jogo">2026 - Ação/Aventura</p>
                    </div>
                </div>
            </div>

            <div class="card-jogo">
                <div class="capa-wrapper">
                    <img src="../Images/Tomodachi Life.jpg" alt="Tomodachi Life">
                    <div class="info-overlay">
                        <h2 class="titulo-jogo">Tomodachi Life</h2>
                        <p class="detalhes-jogo">2026 - Simulator</p>
                    </div>
                </div>
            </div>

            <div class="card-jogo">
                <div class="capa-wrapper">
                    <img src="../Images/Vivarium.jpg" alt="Vivarium">
                    <div class="info-overlay">
                        <h2 class="titulo-jogo">Vivarium</h2>
                        <p class="detalhes-jogo">2027 - Aventura</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
